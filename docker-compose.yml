name: uxsense

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-uxsense}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-uxsense}
      POSTGRES_DB: ${POSTGRES_DB:-uxsense}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-uxsense}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - screenshots:/app/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # The worker & beat services come online once app/workers lands (Phase 3),
  # and switch to Dockerfile.worker (Playwright + Lighthouse) in Phase 4.
  worker:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./backend:/app
      - screenshots:/app/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=info
    profiles: ["workers"]

  beat:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./backend:/app
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A app.workers.celery_app.celery_app beat --loglevel=info
    profiles: ["workers"]

volumes:
  pgdata:
  redisdata:
  screenshots:
